name: "Terraform CI/CD — Robot Shop Infrastructure"

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch: # Allow manual trigger

# ─────────────────────────────────────────────────────────────────────────────
# Global defaults & concurrency guard
# Prevents two runs from racing on the same environment state
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: terraform-prod-${{ github.ref }}
  cancel-in-progress: false # Never cancel a running apply; let it finish

defaults:
  run:
    working-directory: terraform/environment/prod
    shell: bash

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: "ap-south-1"
  # Working dir used by steps that need an explicit path
  TF_WORKING_DIR: terraform/environment/prod

# ─────────────────────────────────────────────────────────────────────────────
# Minimum required permissions for OIDC token exchange
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write # Required — allows GitHub to request the OIDC JWT
  contents: read # Required — allows checkout
  pull-requests: write # Required — allows posting plan output as PR comment

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: FORMAT CHECK
  # Validates that all .tf files follow canonical HCL formatting
  # ───────────────────────────────────────────────────────────────────────────
  fmt:
    name: "Format Check (terraform fmt)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Formatting — Module VPC
        run: terraform fmt -check -recursive
        working-directory: terraform/modules/vpc

      - name: Check Formatting — Prod Environment
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: VALIDATE
  # Performs syntax validation and schema checking; does NOT contact AWS
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    name: "Validate (terraform validate)"
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (local backend for validation)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: LINT (tflint)
  # Deep linting: detects deprecated args, unused declarations, bad patterns
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint (tflint)"
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.50.3"

      - name: Init TFLint (download AWS ruleset)
        run: tflint --init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint — Modules
        run: tflint --recursive --format compact
        working-directory: terraform/modules

      - name: Run TFLint — Prod Environment
        run: tflint --format compact
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4: SECURITY SCAN (checkov)
  # Shift-left security: detects misconfigurations before they reach AWS
  # ───────────────────────────────────────────────────────────────────────────
  # security:
  #   name: "Security Scan (checkov)"
  #   runs-on: ubuntu-latest
  #   needs: [validate]
  #   steps:
  #     - name: Checkout Repository
  #       uses: actions/checkout@v4

  #     - name: Run Checkov Security Scan
  #       uses: bridgecrewio/checkov-action@v12
  #       with:
  #         directory: terraform/
  #         framework: terraform
  #         quiet: true        # Only print failing checks
  #         soft_fail: false   # Fail the job on HIGH/CRITICAL findings
  #         output_format: cli
  #         skip_check: >-
  #           CKV_AWS_117,
  #           CKV_AWS_7,
  #           CKV_AWS_130,
  #           CKV_AWS_144,
  #           CKV2_AWS_62
  # CKV_AWS_130  — map_public_ip_on_launch=true is intentional for public subnets (ELB/NAT)
  # CKV_AWS_144  — cross-region S3 replication is overkill for a Terraform state bucket
  # CKV2_AWS_62  — S3 event notifications not required for state bucket

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5: TERRAFORM PLAN
  # Authenticates via OIDC, initialises with S3 backend, and produces a plan
  # ───────────────────────────────────────────────────────────────────────────
  plan:
    name: "Plan (terraform plan)"
    runs-on: ubuntu-latest
    needs: [lint]
    # environment: prod
    outputs:
      # Expose exit code so the apply job can check whether changes exist
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      # ── OIDC Authentication ──────────────────────────────────────────────
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformPlan

      # ── Initialise with S3 Remote Backend ────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false

      # ── Generate Plan & capture exit code ────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -detailed-exitcode \
            -out=tfplan.binary \
            -var-file="terraform.tfvars"
        continue-on-error: true # We check exit code manually

      - name: Evaluate Plan Exit Code
        run: |
          echo "Plan exit code: ${{ steps.plan.outputs.exitcode }}"
          # Exit code 0 = no changes, 1 = error, 2 = changes present
          if [[ "${{ steps.plan.outputs.exitcode }}" == "1" ]]; then
            echo "::error::Terraform plan failed with an error!"
            exit 1
          fi

      # ── Convert binary plan to human-readable text ───────────────────────
      - name: Generate Plan Summary
        if: always()
        run: terraform show -no-color tfplan.binary > plan.txt 2>&1 || true

      # ── Post plan output as a PR comment ─────────────────────────────────
      - name: Post Plan to Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... [output truncated — see workflow logs for full plan]'
              : plan;

            const body = `## Terraform Plan — \`prod\`
            <details><summary>Click to expand plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            **Exit Code:** \`${{ steps.plan.outputs.exitcode }}\`
            > \`0\` = No changes · \`2\` = Changes pending · \`1\` = Error`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ── Upload plan artifact for the apply job ───────────────────────────
      - name: Upload Plan Artifact
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan.binary
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6: TERRAFORM APPLY
  # Only runs on merge to main, only when plan detected changes (exit code 2)
  # ───────────────────────────────────────────────────────────────────────────
  apply:
    name: "Apply (terraform apply)"
    runs-on: ubuntu-latest
    needs: [plan]
    # Gate 1: Only run on push to main (not PRs)
    # Gate 2: Only run when the plan has pending changes
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.plan.outputs.plan_exit_code == '2'
    # environment:
    #   name: prod # Requires a GitHub Environment approval gate (recommended)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── OIDC Authentication ──────────────────────────────────────────────
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformApply

      - name: Terraform Init
        run: terraform init -input=false

      # ── Download the exact plan generated in the plan job ─────────────────
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}

      # ── Apply from the saved plan — no interactive prompts ────────────────
      - name: Terraform Apply
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            tfplan.binary
